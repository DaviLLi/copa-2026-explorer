name: CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy para EC2
        uses: burnett01/rsync-deployments@5.2.1
        with:
          switches: -avzr --delete
          path: ./*
          remote_path: /opt/copa-2026-explorer/
          remote_host: 54.233.35.188
          remote_user: ubuntu
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Reiniciar aplicação
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.233.35.188
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/copa-2026-explorer
            pm2 restart copa-2026-explorer
